name: Process and Cut Video from Drive & MEGA

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "Masukkan URL (Pisahkan koma/enter, Drive atau MEGA)"
        required: true
        type: textarea
      timestamps:
        description: "Format: 00:10-00:20,00:30-00:40"
        required: false
        default: ''
      videoTitle:
        description: "Judul Video"
        required: false
        default: ''
      channelName:
        description: "Nama Target Channel"
        required: false
        default: ''

jobs:
  build-and-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Instalasi lengkap untuk Drive (gdown) dan Mega (megatools)
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg megatools
          pip install -U gdown requests
          mkdir -p downloads

      - name: Run Video Processing Script
        id: process_video
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          TIMESTAMPS: ${{ github.event.inputs.timestamps }}
        run: |
          python << 'PYTHON'
          import os
          import sys
          import re

          video_url = os.environ.get("VIDEO_URL", "").strip()
          timestamps_raw = os.environ.get("TIMESTAMPS", "").strip()

          if not video_url:
              print("⚠️ URL Video kosong.")
              sys.exit(0)

          urls = re.split(r'[\n,]+', video_url)
          downloaded_files = []

          # LOOP DOWNLOAD (HYBRID: DRIVE & MEGA)
          for idx, url in enumerate(urls):
              url = url.strip()
              if not url: continue
              
              file_name = f"video_{idx}.mp4"
              print(f"Memproses link ke-{idx+1}: {url}")
              
              import glob
              import shutil

             file_name = f"video_{idx}"

             if "mega.nz" in url:
             before = set(glob.glob("downloads/*"))

            os.system(f'megadl "{url}" --path downloads')

            after = set(glob.glob("downloads/*"))
            new_files = list(after - before)

            if new_files:
              src = new_files[0]
             ext = os.path.splitext(src)[1]
            dst = file_name + ext
              shutil.move(src, dst)   
              else:
                  m = re.search(r'/d/([a-zA-Z0-9_-]+)', url) or re.search(r'id=([a-zA-Z0-9_-]+)', url)
                  if m:
                      drive_id = m.group(1)
                      os.system(f'gdown "https://drive.google.com/uc?id={drive_id}" -O {file_name}')
              
              if os.path.exists(file_name) and os.path.getsize(file_name) > 0:
                  if not file_name.endswith('.mp4'):
                      os.rename(file_name, file_name + '.mp4')
                      downloaded_files.append(file_name + '.mp4')
                  else:
                      downloaded_files.append(file_name)

          if not downloaded_files:
              print("❌ Semua download gagal.")
              sys.exit(1)

          # GABUNGKAN
          if len(downloaded_files) == 1:
              os.rename(downloaded_files[0], "video_mentah.mp4")
          else:
              with open("concat_list.txt", "w") as f:
                  for f_name in downloaded_files:
                      f.write(f"file '{f_name}'\n")
              os.system('ffmpeg -y -f concat -safe 0 -i concat_list.txt -c:v libx264 -c:a aac video_mentah.mp4')

          # POTONG
          if timestamps_raw:
              parts = timestamps_raw.split(",")
              filter_complex = "".join([f"[0:v]trim=start={p.split('-')[0]}:end={p.split('-')[1]},setpts=PTS-STARTPTS[v{i}];[0:a]atrim=start={p.split('-')[0]}:end={p.split('-')[1]},asetpts=PTS-STARTPTS[a{i}];" for i, p in enumerate(parts)])
              concat_inputs = "".join([f"[v{i}][a{i}]" for i in range(len(parts))])
              filter_complex += f"{concat_inputs}concat=n={len(parts)}:v=1:a=1[outv][outa]"
              
              os.system(f'ffmpeg -y -i "video_mentah.mp4" -filter_complex "{filter_complex}" -map "[outv]" -map "[outa]" -c:v libx264 -c:a aac video.mp4')
          else:
              os.rename("video_mentah.mp4", "video.mp4")
          PYTHON

      - name: Send Video to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VIDEO_TITLE: ${{ github.event.inputs.videoTitle }}
        run: |
          if [ -f "video.mp4" ]; then
            curl -v -F "video=@video.mp4" -F "chat_id=$TELEGRAM_CHAT_ID" \
              -F "caption=🚀 Video Selesai:%0A📌 *Judul:* $VIDEO_TITLE" \
              -F "parse_mode=Markdown" \
              "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendVideo"
          else
            echo "⚠️ File video.mp4 tidak ditemukan."
          fi
