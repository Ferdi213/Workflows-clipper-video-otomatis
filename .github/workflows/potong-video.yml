name: Process and Cut Video

on:
  workflow_dispatch:
    inputs:
      video_url:
        required: false
        default: ''
      timestamps:
        required: false
        default: ''
      judul:
        required: false
        default: ''
      deskripsi:
        required: false
        default: ''
      tag:
        required: false
        default: ''
      channel:
        required: false
        default: ''
      lokasi:
        required: false
        default: ''
      penggunaan_ai:
        required: false
        default: ''
      pembatasan_usia:
        required: false
        default: ''
      pilih_audiens:
        required: false
        default: ''
      tanggal_bulan_tahun:
        required: false
        default: ''
      jam_tayang:
        required: false
        default: ''

jobs:
  build-and-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug Inputs
        run: |
          echo "VIDEO_URL=${{ github.event.inputs.video_url }}"
          echo "TIMESTAMPS=${{ github.event.inputs.timestamps }}"
          echo "CHANNEL=${{ github.event.inputs.channel }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg, yt-dlp & requests
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install -U yt-dlp requests

      - name: Create cookies.txt
        run: |
          cat > cookies.txt << 'EOF'
          ${{ secrets.YT_COOKIES }}
          EOF

      - name: Run Video Processing Script
        id: process_video
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          TIMESTAMPS: ${{ github.event.inputs.timestamps }}
        run: |
          python << 'PYTHON'
          import os
          import sys
          import glob
          import re
          import requests

          video_url = os.environ.get("VIDEO_URL", "").strip()
          timestamps_raw = os.environ.get("TIMESTAMPS", "").strip()

          if not video_url:
              print("⚠️ URL Video kosong. Melewati proses download & potong.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("skip_upload=true\n")
              sys.exit(0)

          print("Download target:", video_url)
          download_success = False

          # Extract Video ID
          video_id_match = re.search(r'(?:v=|\/shorts\/|\/embed\/|\/watch\?v=)([a-zA-Z0-9_-]{11})', video_url)
          video_id = video_id_match.group(1) if video_id_match else None

          # METODE 1: Piped API (Sangat Kuat Bypass Bot Protection YouTube)
          if video_id:
              print(f"Mengambil video via Piped API untuk ID: {video_id}...")
              piped_instances = [
                  "https://pipedapi.kavin.rocks",
                  "https://api.piped.privacydev.net",
                  "https://piped-api.garudalinux.org",
                  "https://pipedapi.projectsegfau.lt"
              ]
              
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
              }

              for instance in piped_instances:
                  try:
                      api_url = f"{instance}/streams/{video_id}"
                      print(f"Mencoba Piped API: {api_url}")
                      res = requests.get(api_url, headers=headers, timeout=15)
                      if res.status_code == 200:
                          data = res.json()
                          
                          # Ambil video streams (pilih format gabungan video+audio atau video MP4)
                          streams = data.get("videoStreams", [])
                          target_url = None
                          
                          # Cari stream mp4 resolusi terbaik
                          for stream in streams:
                              if stream.get("mimeType", "").startswith("video/mp4") and stream.get("videoOnly") is False:
                                  target_url = stream.get("url")
                                  break
                          
                          # Jika tidak ada video+audio, pakai stream video biasa
                          if not target_url and streams:
                              target_url = streams[0].get("url")

                          if target_url:
                              print("Dapat URL Direct dari Piped API! Mengunduh...")
                              r = requests.get(target_url, stream=True, headers=headers, timeout=60)
                              with open("video_mentah.mp4", "wb") as f:
                                  for chunk in r.iter_content(chunk_size=1024*1024):
                                      if chunk:
                                          f.write(chunk)
                              download_success = True
                              print("Download via Piped API Sukses!")
                              break
                  except Exception as e:
                      print(f"Gagal Piped API ({instance}):", str(e))

          # METODE 2: Fallback yt-dlp via TV Client (Tanpa Cookies)
          if not download_success:
              print("⚠️ Piped API gagal, mencoba yt-dlp tv client...")
              cmd_ytdlp = (
                  f'yt-dlp '
                  f'--extractor-args "youtube:player_client=tv" '
                  f'--recode-video mp4 '
                  f'"{video_url}" '
                  f'-o "video_mentah.mp4"'
              )
              if os.system(cmd_ytdlp) == 0:
                  download_success = True

          files = glob.glob("video_mentah.*")
          if not download_success or not files:
              print("❌ Semua metode download gagal. Hentikan proses.")
              sys.exit(1)

          source = files[0]
          print("Downloaded file:", source)

          # PROSES POTONG VIDEO DENGAN FFMPEG
          if timestamps_raw:
              print("Memotong video dengan timestamps:", timestamps_raw)
              parts = timestamps_raw.split(",")
              filter_complex = ""
              concat_inputs = ""

              for i, item in enumerate(parts):
                  start, end = item.strip().split("-")
                  filter_complex += (
                      f"[0:v]trim=start={start}:end={end},setpts=PTS-STARTPTS[v{i}];"
                      f"[0:a]atrim=start={start}:end={end},asetpts=PTS-STARTPTS[a{i}];"
                  )
                  concat_inputs += f"[v{i}][a{i}]"

              filter_complex += (
                  f"{concat_inputs}concat=n={len(parts)}:v=1:a=1[outv][outa]"
              )

              ffmpeg_cmd = (
                  f'ffmpeg -y '
                  f'-i "{source}" '
                  f'-filter_complex "{filter_complex}" '
                  f'-map "[outv]" '
                  f'-map "[outa]" '
                  f'-c:v libx264 '
                  f'-c:a aac '
                  f'video.mp4'
              )

              print("Running FFmpeg...")
              if os.system(ffmpeg_cmd) != 0:
                  print("FFmpeg gagal memotong video.")
                  sys.exit(1)

          else:
              os.rename(source, "video.mp4")

          print("Proses download dan pemotongan selesai!")
          PYTHON

      - name: Setup Node.js
        if: steps.process_video.outputs.skip_upload != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node Dependencies
        if: steps.process_video.outputs.skip_upload != 'true'
        run: |
          npm install googleapis

      - name: Upload to YouTube via Node.js
        if: steps.process_video.outputs.skip_upload != 'true'
        env:
          CLIENT_ID: ${{ secrets[format('YOUTUBE_CLIENT_ID_f044_{0}', github.event.inputs.channel)] }}
          CLIENT_SECRET: ${{ secrets[format('YOUTUBE_CLIENT_SECRET_f044_{0}', github.event.inputs.channel)] }}
          REFRESH_TOKEN: ${{ secrets[format('YOUTUBE_REFRESH_TOKEN_f044_{0}', github.event.inputs.channel)] }}

          VIDEO_TITLE: ${{ github.event.inputs.judul }}
          VIDEO_DESCRIPTION: ${{ github.event.inputs.deskripsi }}
          PUBLISH_DATE: ${{ github.event.inputs.tanggal_bulan_tahun }}
          VIDEO_TIME: ${{ github.event.inputs.jam_tayang }}
          LOCATION: ${{ github.event.inputs.lokasi }}
          TAGS: ${{ github.event.inputs.tag }}
          AI_CONTENT: ${{ github.event.inputs.penggunaan_ai }}
          AUDIENCE: ${{ github.event.inputs.pilih_audiens }}
          AGE_RESTRICTION: ${{ github.event.inputs.pembatasan_usia }}
          THUMBNAIL_ID: ""

        run: |
          node upload.js
