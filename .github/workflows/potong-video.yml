Name: Process and Cut Video

on:
  repository_dispatch:
    types: [potong_video_event] # Pemicu dari n8n

jobs:
  build-and-process:
    runs-on: ubuntu-latest

    steps:
      # 1. Ambil kode dari repository Anda
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Python & Install Tools (FFmpeg + yt-dlp + MoviePy + YouTube API)
      - name: Set up Python & Install Dependencies
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install FFmpeg & Python Libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp moviepy google-api-python-client google-auth-httplib2 google-auth-oauthlib

      # 3. Jalankan Script Python Potong & Gabung Video
      - name: Run Video Processing Script
        env:
          VIDEO_URL: ${{ github.event.client_payload.video_url }}
          TIMESTAMPS: ${{ github.event.client_payload.timestamps }}
          JUDUL: ${{ github.event.client_payload.judul }}
          DESKRIPSI: ${{ github.event.client_payload.deskripsi }}
          TAG: ${{ github.event.client_payload.tag }}
          CHANNEL: ${{ github.event.client_payload.channel }}
          LOKASI: ${{ github.event.client_payload.lokasi }}
          PENGGUNAAN_AI: ${{ github.event.client_payload.penggunaan_ai }}
          PEMBATASAN_USIA: ${{ github.event.client_payload.pembatasan_usia }}
          PILIH_AUDIENS: ${{ github.event.client_payload.pilih_audiens }}
        run: |
          python process_video.py

      # 4. Upload Langsung ke YouTube (Full & Aktif)
      - name: Upload to YouTube
        env:
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          JUDUL: ${{ github.event.client_payload.judul }}
          DESKRIPSI: ${{ github.event.client_payload.deskripsi }}
          TAG: ${{ github.event.client_payload.tag }}
          CHANNEL: ${{ github.event.client_payload.channel }}
          PEMBATASAN_USIA: ${{ github.event.client_payload.pembatasan_usia }}
          PILIH_AUDIENS: ${{ github.event.client_payload.pilih_audiens }}
          AI_CONTENT: ${{ github.event.client_payload.penggunaan_ai }}
        run: |
          python upload_to_youtube.py
